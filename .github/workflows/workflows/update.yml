name: Update Dashboard Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Create .env from GitHub Secrets
        run: |
          echo "DATA_GO_KR_KEY=${{ secrets.DATA_GO_KR_KEY }}" > .env
          echo "HRFCO_KEY=${{ secrets.HRFCO_KEY }}" >> .env
          echo "SAFETY_DATA_KEY=${{ secrets.SAFETY_DATA_KEY }}" >> .env

      - name: Run data collector
        run: python tools/update_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .tmp
          git add -A data.js "상황판.html" .tmp/rain_history.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            git commit -m "데이터 갱신 $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then
                echo "푸시 성공"
                break
              fi
              echo "재시도 $i..."
              sleep 5
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
